		47A0B1C22F4A000100000001 /* Stamp Version from Git Tag */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputPaths = (
			);
			name = "Stamp Version from Git Tag";
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/bash;
			shellScript = "#!/bin/bash\\n# Auto-version from git tags\\n# CI can override via MACSCP_VERSION / MACSCP_BUILD_NUMBER env vars\\n\\nPLIST=\"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\"\\n\\nif [ ! -f \"$PLIST\" ]; then\\n    echo \"warning: Info.plist not found at $PLIST, skipping version stamp\"\\n    exit 0\\nfi\\n\\n# --- Marketing version ---\\nif [ -n \"$MACSCP_VERSION\" ]; then\\n    VERSION=\"$MACSCP_VERSION\"\\nelse\\n    VERSION=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null | sed 's/^v//')\\nfi\\n\\nif [ -n \"$VERSION\" ] && echo \"$VERSION\" | grep -qE '^[0-9]+\\\\.[0-9]+\\\\.[0-9]+$'; then\\n    /usr/libexec/PlistBuddy -c \"Set :CFBundleShortVersionString $VERSION\" \"$PLIST\"\\n    echo \"Stamped marketing version: $VERSION\"\\nelse\\n    echo \"warning: Could not determine version from git tag, keeping plist default\"\\nfi\\n\\n# --- Build number ---\\nif [ -n \"$MACSCP_BUILD_NUMBER\" ]; then\\n    BUILD=\"$MACSCP_BUILD_NUMBER\"\\nelse\\n    BUILD=$(date +%m%d%Y)\\nfi\\n\\n/usr/libexec/PlistBuddy -c \"Set :CFBundleVersion $BUILD\" \"$PLIST\"\\necho \"Stamped build number: $BUILD\"\\n";
		};
/* End PBXShellScriptBuildPhase section */

